<!DOCTYPE html>
<html>
<head>
  <title>Tugas Dart - Marsya</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 20px;
      max-width: 600px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    button {
      margin-top: 10px;
      padding: 10px 14px;
      background: purple;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    img {
      width: 100%;
      margin-top: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
    }
    .modal-box {
      background: white;
      width: 90%;
      max-width: 900px;
      margin: 5% auto;
      padding: 15px;
      border-radius: 10px;
    }
    .close {
      float: right;
      cursor: pointer;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Program Perhitungan Dart</h2>
  <p>
    Program ini dibuat menggunakan bahasa Dart sebagai latihan memahami alur logika pemrograman.
    Hasil dari proses program ditampilkan dalam bentuk gambar pada bagian berikut.
  </p>

  <button onclick="openModal()">Detail & Source Code</button>

  <img src="output.png" alt="Output Program Dart">
</div>

<div id="modal" class="modal">
  <div class="modal-box">
    <span class="close" onclick="closeModal()">✖</span>
    <iframe
      src="https://dartpad.dev/embed-dart.html?id=02a5ebdb057923071d0ed9bc15c70b6f"
      width="100%"
      height="500">
    </iframe>
  </div>
</div>

<script>
  function openModal() {
    document.getElementById("modal").style.display = "block";
  }
  function closeModal() {
    document.getElementById("modal").style.display = "none";
  }
</script>

</body>
</html>
