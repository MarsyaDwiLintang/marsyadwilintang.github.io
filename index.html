<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tugas Dart - Marsya</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Roboto&display=swap');

* { box-sizing: border-box; }

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  font-family:Roboto,sans-serif;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color:#fff;
}

.card{
  width:100%;
  max-width:380px;
  background:rgba(255,255,255,.07);
  backdrop-filter:blur(12px);
  padding:24px;
  border-radius:16px;
  text-align:center;
}

h2{
  font-family:Orbitron;
  color:#ff00ff;
}

button{
  width:100%;
  margin-top:16px;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-family:Orbitron;
  background:linear-gradient(45deg,#ff00ff,#00ffff);
  color:white;
}

img{
  width:100%;
  margin-top:20px;
  border-radius:12px;
}

/* ===== MODAL (ANTI AUTO OPEN) ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:15px;

  /* KUNCI */
  visibility:hidden;
  opacity:0;
  pointer-events:none;
  transition:.2s;
}

.modal.active{
  visibility:visible;
  opacity:1;
  pointer-events:auto;
}

.modal-box{
  width:100%;
  max-width:900px;
  background:#111;
  padding:15px;
  border-radius:16px;
}

.close{
  text-align:right;
  cursor:pointer;
  font-size:22px;
  color:#ff00ff;
}

iframe{
  width:100%;
  height:60vh;
  border:none;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="card">
  <h2>Program Perhitungan Dart</h2>
  <p>
    Program ini dibuat menggunakan bahasa Dart
    untuk melatih pemahaman logika pemrograman.
  </p>

  <button onclick="openModal()">Lihat Source Code</button>

  <img src="output.jpeg" alt="Output Program">
</div>

<div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="close" onclick="closeModal()">✖</div>
    <iframe src="https://dartpad.dev/embed-dart.html?id=02a5ebdb057923071d0ed9bc15c70b6f"></iframe>
  </div>
</div>

<script>
function openModal(){
  document.getElementById("modal").classList.add("active");
}
function closeModal(){
  document.getElementById("modal").classList.remove("active");
}
</script>

</body>
</html>
