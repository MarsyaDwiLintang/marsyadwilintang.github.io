<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tugas Dart - Marsya</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;500&display=swap');

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 20px;
    }

    /* ===== CARD ===== */
    .card {
      width: 100%;
      max-width: 380px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      padding: 24px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.2);
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.4rem;
      margin-bottom: 12px;
      color: #ff00ff;
      text-shadow: 0 0 10px #ff00ff;
    }

    p {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #ddd;
    }

    button {
      margin-top: 18px;
      width: 100%;
      padding: 12px;
      font-family: 'Orbitron', sans-serif;
      font-weight: bold;
      background: linear-gradient(45deg, #ff00ff, #00ffff);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255,0,255,0.6);
    }

    img {
      margin-top: 20px;
      width: 100%;
      height: auto;
      border-radius: 12px;
      border: 2px solid #ff00ff;
      box-shadow: 0 0 15px #ff00ff;
    }

    /* ===== MODAL (FIX MOBILE) ===== */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      overflow-y: auto;   /* PENTING */
      padding: 20px;
    }

    .modal-box {
      width: 100%;
      max-width: 900px;
      background: #111;
      border-radius: 16px;
      padding: 15px;
      border: 1px solid #ff00ff;
      box-shadow: 0 0 20px #ff00ff;
      margin: 40px auto; /* mulai dari atas */
    }

    .close {
      text-align: right;
      font-size: 22px;
      cursor: pointer;
      color: #ff00ff;
      margin-bottom: 10px;
    }

    iframe {
      width: 100%;
      height: 60vh;
      border: none;
      border-radius: 12px;
    }

    /* RESPONSIVE */
    @media (max-width: 480px) {
      h2 { font-size: 1.25rem; }
      p { font-size: 0.9rem; }
      iframe { height: 55vh; }
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Program Perhitungan Dart</h2>
    <p>
      Program ini dibuat menggunakan bahasa Dart untuk melatih pemahaman
      alur logika pemrograman. Hasil eksekusi program ditampilkan dalam
      bentuk output berikut.
    </p>

    <button onclick="openModal()">Detail & Source Code</button>

    <img src="output.jpeg" alt="Output Program Dart">
  </div>

  <!-- MODAL -->
  <div id="modal" class="modal">
    <div class="modal-box">
      <div class="close" onclick="closeModal()">✖</div>
      <iframe
        src="https://dartpad.dev/embed-dart.html?id=02a5ebdb057923071d0ed9bc15c70b6f">
      </iframe>
    </div>
  </div>

  <script>
    function openModal() {
      document.getElementById("modal").style.display = "block";
      document.body.style.overflow = "hidden"; // kunci scroll body
    }

    function closeModal() {
      document.getElementById("modal").style.display = "none";
      document.body.style.overflow = "auto";
    }
  </script>

</body>
</html>
